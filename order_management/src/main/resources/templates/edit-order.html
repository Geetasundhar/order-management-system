<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Order</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container py-5">

    <div class="form-card">

        <h2 class="text-center mb-4">Edit Order</h2>

        <form th:action="@{/orders/update/{id}(id=${order.id})}"
              method="post">

            <div class="mb-3">

                <label>Customer Name</label>

                <input type="text"
                       class="form-control"
                       name="customerName"
                       th:value="${order.customerName}">
            </div>

            <div class="mb-3">

                <label>Product Name</label>

                <input type="text"
                       class="form-control"
                       name="productName"
                       th:value="${order.productName}">
            </div>

            <div class="mb-3">

                <label>Quantity</label>

                <input type="number"
                       class="form-control"
                       name="quantity"
                       th:value="${order.quantity}">
            </div>

            <div class="mb-3">

                <label>Price</label>

                <input type="number"
                       class="form-control"
                       name="price"
                       th:value="${order.price}">
            </div>

            <div class="mb-4">

                <label>Status</label>

                <select class="form-select"
                        name="status">

                    <option th:selected="${order.status=='Pending'}">
                        Pending
                    </option>

                    <option th:selected="${order.status=='Processing'}">
                        Processing
                    </option>

                    <option th:selected="${order.status=='Delivered'}">
                        Delivered
                    </option>

                </select>

            </div>

            <button class="btn btn-custom w-100">
                Update Order
            </button>

        </form>

    </div>

</div>

</body>
</html>
