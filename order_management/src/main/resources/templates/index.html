<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Management System</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container py-5">
	<div class="row g-4 mb-5">

	    <div class="col-md-3">

	        <div class="stats-card">

	            <h5>Total Orders</h5>

	            <h2 th:text="${totalOrders}"></h2>

	        </div>

	    </div>

	    <div class="col-md-3">

	        <div class="stats-card pending-card">

	            <h5>Pending Orders</h5>

	            <h2 th:text="${pendingOrders}"></h2>

	        </div>

	    </div>

	    <div class="col-md-3">

	        <div class="stats-card delivered-card">

	            <h5>Delivered Orders</h5>

	            <h2 th:text="${deliveredOrders}"></h2>

	        </div>

	    </div>

	    <div class="col-md-3">

	        <div class="stats-card revenue-card">

	            <h5>Total Revenue</h5>

	            <h2>
	                ₹ <span th:text="${totalRevenue}"></span>
	            </h2>

	        </div>

	    </div>

	</div>

    <div class="dashboard-card">

        <div class="text-center mb-4">
            <h1 class="main-title">Order Management System</h1>
            <p class="subtitle">Manage customer orders efficiently</p>
        </div>

        <div class="row g-4">

            <div class="col-md-6">
                <div class="feature-card">

                    <h3>Add Orders</h3>

                    <p>Create and manage customer orders easily.</p>

                    <a href="/add-order" class="btn btn-custom">
                        Add Order
                    </a>

                </div>
            </div>

            <div class="col-md-6">
                <div class="feature-card">

                    <h3>View Orders</h3>

                    <p>See all customer orders in one place.</p>

                    <a href="/orders-page" class="btn btn-custom">
                        View Orders
                    </a>

                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
