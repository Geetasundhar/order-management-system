<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Orders</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container py-5">
	<form th:action="@{/orders/search}"
	      method="get"
	      class="mb-4">

	    <div class="row">

	        <div class="col-md-10">

	            <input type="text"
	                   name="keyword"
	                   class="form-control"
	                   placeholder="Search by customer, product or status">

	        </div>

	        <div class="col-md-2">

	            <button class="btn btn-custom w-100">
	                Search
	            </button>

	        </div>

	    </div>

	</form>

    <div class="table-card">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2>All Orders</h2>

            <a href="/add-order" class="btn btn-custom">
                Add Order
            </a>

        </div>

        <div class="table-responsive">

            <table class="table table-hover">

                <thead>

                <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="order : ${orders}">

                    <td th:text="${order.id}"></td>

                    <td th:text="${order.customerName}"></td>

                    <td th:text="${order.productName}"></td>

                    <td th:text="${order.quantity}"></td>

                    <td th:text="${order.price}"></td>

                    <td>

                        <span class="badge bg-success"
                              th:text="${order.status}">
                        </span>

                    </td>

                    <td>

                        <a th:href="@{/orders/delete/{id}(id=${order.id})}"
                           class="btn btn-danger btn-sm">

                            Delete

                        </a>
						<a th:href="@{/orders/edit/{id}(id=${order.id})}"
						   class="btn btn-warning btn-sm">
						    Edit
						</a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
